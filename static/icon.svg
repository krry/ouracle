<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#grad)"/>
  <!-- Nebulous double torus simplified -->
  <ellipse cx="256" cy="180" rx="140" ry="50" fill="none" stroke="#a78bfa" stroke-width="8" opacity="0.6"/>
  <ellipse cx="256" cy="330" rx="140" ry="50" fill="none" stroke="#c4b5fd" stroke-width="8" opacity="0.6"/>
  <!-- Central aperture -->
  <circle cx="256" cy="256" r="70" fill="#0a0a0a"/>
  <!-- Text: O -->
  <text x="256" y="275" font-family="Georgia, serif" font-size="120" font-weight="400" fill="url(#grad)" text-anchor="middle">O</text>
</svg>