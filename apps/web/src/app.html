<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Piazzolla:ital,opsz,wght@0,8..30,300;0,8..30,400;0,8..30,600;0,8..30,800;1,8..30,400&family=Fira+Code:wght@400;500&family=Inter:wght@400;500&display=swap" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Ouracle" />
		<meta name="theme-color" content="#0a0a0a" />
		<script src="https://kerry.ink/widgets/webring/webring.wc.js"></script>
		<script>
			// Register the service worker WITHOUT the controllerchange→reload handler that
			// VitePWA injects by default. On iOS, the SW is evicted under memory pressure
			// and reinstalls on return, firing controllerchange → window.location.reload()
			// every few minutes. We skip that listener entirely — the SW still caches assets,
			// we just never force a reload because of it.
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', function () {
					navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function () {});
				});
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
